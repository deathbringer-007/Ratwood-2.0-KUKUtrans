author: "ophaq"
delete-after: True
changes:
  - rscadd: "Adds beauty trait to eoran missionaries."
  - qol: "Gives eoran missionaries the iron scissors on their belt instead of in-hand."
  - bugfix: "Eoran calm's aura is now much less impactful. It was way too glowy before."
  - qol: "Eora's bud miracle takes slightly less time to charge now."
  - bugfix: "The aura from the eoran tree no longer overlaps with the eoran calm aura, preventing a subtle but annoying graphical effect."
  - qol: "Eoran trees only need to be watered once each harvest now, consuming 20 drams. Blessed water is acceptable now, not just clean water. Watering only takes 1 second."
  - qol: "Eoran trees now just need to be fertilized twice at most per harvest. Still scales off farming skill, and it should only take about a second each fertilizing. Fertilizer applied (not compost) will halve the next fruiting cycle's time."
  - rscadd: "Fixed some examine feedback after pruning the tree. Pruning only takes 10 seconds down from 15. Still scales off farming skill. Only needs to be done once after each harvest. Examining the tree at jman+ farming tells you the next harvest cycle's time."
  - rscadd: "Added the massage ability as a T0 miracle to eorans."
  - rscadd: "Ports flower bed miracle from AP: https://github.com/Azure-Peak/Azure-Peak/pull/7003"