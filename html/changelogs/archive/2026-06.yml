  - rscadd: ancient and decrepit bascinets distributed to the venerated death knight
      and also made craftable
  - rscadd: ancient and decrepit kettle helmets distributed to the ancient ballistiares
      and also made craftable
  - rscadd: the venerated death knight, a singular slot fortified skeleton with massive
      stats and heavy armor, at the draw of incredibly low mobility and an innability
      to sprint
  - rscadd: decrepit buckler
  - rscadd: fortified skeletons can choose what cloak they rock between a few options,
      all in necromancer black
  - rscadd: fortified skeletons spawn in with a pouch full of ancient coins to larp
      skeleton economy with
  - balance: skeletons have lost their critical weakness where they had it, and gained
      a new trait in its place - SHATTER WEAKNESS - which makes them instantly die
      in the event of their ribs, spine, or any part of their head being shattered
  - balance: skeletons have been given their ability to use swift intent back, as
      its removal was primarily a consequence of a time where skeletons had infinite
      stamina and thus could use swift intent without consequences
  - balance: fortified skeletons are allowed to choose between a chain coif or a gorget
      upon spawning in
  - balance: fortified skeletons have had their baseline weapon skill levels reduced,
      gaining an increase to the original values only in their chosen weapon types
  - balance: ancient legionnaire gains a point of SPD, loses a point of CON
  - balance: ancient legionnaire is given a choice between sidearms, being javelins
      - a throwing net - or a dagger
  - balance: ancient ballistiares loses a point of CON, two points of WIL, and a point
      of INT
  - balance: ancient ballistiares loses a skill point of athletics
  - balance: death bulwark gains two points of INT, bringing it up to a whopping three
      INT
  - balance: death bulkwark is now a MEDIUMARMOR class
  - balance: death bulwark's stats and skills are now divided into disciplines depending
      on which weapon it chooses
  - balance: death bulwark gains EXPERT weapon skills in its chosen specialization
  - balance: with the greatsword and grand mace options, death bulwark gain high STR
      and drastically reduced CON, making them a slower, heavier hitting sidegrade
      to the ancient legionnaire
  - balance: with the spear and bardiche options, death bulwark gains a little bit
      of STR and PER, allowing them to target vital spots on their opponents
  - balance: with the mace and warhammer options, death bulwark forgoes EXPERT weapon
      skills in exchange for EXPERT shields, high WIL, and heavy armor, truly transforming
      you into the death bulwark
  - balance: the broken bone sapper has been wholly retooled into a light armor noncombatant
      with absolutely zero combat prowess at all, with abysmal combat stats and practically
      no starting armor at all
  - balance: the broken bone sapper has been given lots and lots of crafting skills
      and traits to encourage you to be the undead legion's designated toiler goon
  - balance: skeletons no longer universally get self sufficienct traits
  - bugfix: decrepit grand maces have properly reduced integrity
  - bugfix: gives skeletons the OUTLAW trait to prevent them from using nervelocks
  - bugfix: crafting the ancient buckler making a steel one
  - bugfix: ancient bolt quivers having double the amount of bolts they're supposed
      to
  - spellcheck: the description on the ancient buckler implying that it's decrepit
      and not something made with gilbranze
  - rscdel: staves skill, now everyone who used it previously has had their polearms
      skill upped to compensate
  - balance: quarterstaves are now polearms
