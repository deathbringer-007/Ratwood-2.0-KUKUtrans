      Fertilizer applied (not compost) will halve the next fruiting cycle's time.
  - rscadd: Fixed some examine feedback after pruning the tree. Pruning only takes
      10 seconds down from 15. Still scales off farming skill. Only needs to be done
      once after each harvest. Examining the tree at jman+ farming tells you the next
      harvest cycle's time.
